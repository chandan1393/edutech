<div class="login-page">
  <div class="bg-orb orb1"></div><div class="bg-orb orb2"></div>
  <div class="grid-bg"></div>
  <a routerLink="/login" class="back-link">← Back to Login</a>
  <div class="login-card">
    <div class="card-stripe"></div>
    <div class="card-body">
      <div class="login-header">
        <div class="brand">
          <div class="brand-icon">E</div>
          <span class="brand-text">EduAssist</span>
        </div>
        <h2>Forgot Password?</h2>
        <p>Enter your email and we'll send a reset link.</p>
      </div>
      <div *ngIf="success()" class="alert alert-success">✅ {{ success() }}</div>
      <div *ngIf="error()" class="alert alert-error">⚠️ {{ error() }}</div>
      <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!success()">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" formControlName="email" placeholder="your@email.com" />
          <span class="field-error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">Valid email required</span>
        </div>
        <button type="submit" class="btn-login" [disabled]="loading()">
          {{ loading() ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </form>
      <p class="signup-note" *ngIf="success()"><a routerLink="/login">Back to Login →</a></p>
    </div>
  </div>
</div>
