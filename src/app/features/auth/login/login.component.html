<div class="login-page">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="grid-bg"></div>
  <a routerLink="/" class="back-link">← Back to Home</a>

  <div class="login-card">
    <div class="card-stripe"></div>
    <div class="card-body">
      <div class="login-header">
        <div class="brand">
          <div class="brand-icon">E</div>
          <span class="brand-text">EduAssist</span>
        </div>
        <h2>Welcome Back 👋</h2>
        <p>Sign in to your student, writer or admin account</p>
      </div>

      <div *ngIf="error()" class="alert alert-error">⚠️ {{ error() }}</div>

      <form [formGroup]="form" (ngSubmit)="login()">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" formControlName="email" placeholder="your@email.com" autocomplete="email" />
          <span class="field-error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">Please enter a valid email</span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input [type]="showPass() ? 'text' : 'password'" formControlName="password" placeholder="Your password" autocomplete="current-password" />
            <button type="button" class="toggle-pass" (click)="showPass.set(!showPass())">{{ showPass() ? '🙈' : '👁️' }}</button>
          </div>
          <span class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">Password is required</span>
        </div>
        <div class="forgot-row"><a routerLink="/register" class="register-link">Create account →</a>
        <a routerLink="/forgot-password">Forgot password?</a></div>
        <button type="submit" class="btn-login" [disabled]="loading()">
          {{ loading() ? 'Signing in...' : 'Sign In →' }}
        </button>
      </form>

      <p class="signup-note">No account? <a routerLink="/">Submit a class query</a> to get started.</p>
      <div class="security-row"><span class="lock-icon">🔒</span> Secured with 256-bit encryption</div>
    </div>
  </div>
</div>
